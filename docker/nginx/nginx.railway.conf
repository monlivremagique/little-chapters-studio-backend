server {
    listen 80;
    root /srv/sylius/public;

    client_max_body_size 20M;

    # Redirect Sylius locale shop routes to React frontend (headless setup)
    location ~ "^/(fr_FR|en_US|nl_NL|fr|en|nl)(/.*)?$" {
        return 301 https://www.monlivremagique.be$request_uri;
    }

    location / {
        try_files $uri /index.php$is_args$args;
    }

    location ~ ^/index\.php(/|$) {
        fastcgi_pass 127.0.0.1:9000;
        fastcgi_split_path_info ^(.+\.php)(/.*)$;
        include fastcgi_params;
        fastcgi_param SCRIPT_FILENAME $realpath_root$fastcgi_script_name;
        fastcgi_param DOCUMENT_ROOT $realpath_root;
        fastcgi_read_timeout 300s;
        internal;
    }

    location ~ \.php$ {
        return 404;
    }

    location ~* \.(css|js|png|jpg|jpeg|gif|webp|svg|ico|woff|woff2|ttf|otf|eot)$ {
        expires 2w;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    error_log /dev/stderr;
    access_log /dev/stdout;
}
