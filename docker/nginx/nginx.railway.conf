server {
    listen ${PORT:-80};
    root /srv/sylius/public;

    # Allow large uploads (child photos up to 10MB + overhead)
    client_max_body_size 20M;

    # Redirect Sylius locale shop routes to React frontend (headless setup)
    location ~ ^/(fr_FR|en_US|nl_NL|fr|en|nl)(/.*)?$ {
        return 301 https://www.monlivremagique.be$request_uri;
    }

    # SPA / Symfony front controller
    location / {
        try_files $uri /index.php$is_args$args;
    }

    # PHP-FPM (localhost — single container, no DNS resolver needed)
    location ~ ^/index\.php(/|$) {
        fastcgi_pass 127.0.0.1:9000;
        fastcgi_split_path_info ^(.+\.php)(/.*)$;
        include fastcgi_params;
        fastcgi_param SCRIPT_FILENAME $realpath_root$fastcgi_script_name;
        fastcgi_param DOCUMENT_ROOT $realpath_root;
        # Extend timeout for AI generation polling responses
        fastcgi_read_timeout 300s;
        internal;
    }

    # Block direct PHP file access
    location ~ \.php$ {
        return 404;
    }

    # Static assets — long cache
    location ~* \.(css|js|png|jpg|jpeg|gif|webp|svg|ico|woff|woff2|ttf|otf|eot)$ {
        expires 2w;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    error_log /dev/stderr;
    access_log /dev/stdout;
}
