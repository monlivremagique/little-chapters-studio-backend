# Rate limiting zones — IP-level first line of defense (app-level adds session/token limits).
# Checkout: max 5 req/min per IP to prevent payment flooding.
# Sessions: max 30 req/min per IP (app-level limits per session/token refine further).
# Photo upload: max 5 req/min per IP to prevent storage abuse.
# Auth: max 10 req/min per IP to prevent brute-force registration/login.
# Admin login: max 5 req/min per IP to prevent brute-force.
limit_req_zone $binary_remote_addr zone=checkout_zone:10m rate=5r/m;
limit_req_zone $binary_remote_addr zone=sessions_zone:10m rate=30r/m;
limit_req_zone $binary_remote_addr zone=upload_zone:10m rate=5r/m;
limit_req_zone $binary_remote_addr zone=auth_zone:10m rate=10r/m;
limit_req_zone $binary_remote_addr zone=admin_login_zone:10m rate=5r/m;

# Admin IP allowlist — generated by entrypoint.sh from ADMIN_ALLOWED_IPS env var.
# geo $admin_allowed { default 0; x.x.x.x 1; } when ADMIN_ALLOWED_IPS is set.
# geo $admin_allowed { default 1; }              when not set (open, rate-limited only).
include /etc/nginx/http.d/admin-access.conf;

# Allowed CORS origins — map lives here because this file is included inside http{}.
# Empty string = header not set = browser blocks cross-origin request.
map $http_origin $cors_allowed_origin {
    default                                          "";
    "~^https://(www\.)?monlivremagique\.be$"                $http_origin;
    "~^https://backend\.monlivremagique\.be$"                $http_origin;
    "~^https://[a-zA-Z0-9-]+\.lovableproject\.com$"         $http_origin;
    "~^https://[a-zA-Z0-9-]+\.lovable\.app$"                $http_origin;
    "~^https://[a-zA-Z0-9-]+\.lovable\.dev$"                $http_origin;
    "~^https://[a-zA-Z0-9-]+\.vercel\.app$"                 $http_origin;
    "http://localhost:8080"                                  $http_origin;
    "http://localhost:5173"                                  $http_origin;
    "http://localhost:8001"                                  $http_origin;
}

server {
    listen ${PORT:-80};
    root /srv/sylius/public;

    client_max_body_size 20M;

    # Admin — IP allowlist enforced via geo $admin_allowed.
    location /admin/ {
        if ($admin_allowed = 0) { return 403; }
        try_files $uri /index.php$is_args$args;
    }

    location = /admin/login_check {
        if ($admin_allowed = 0) { return 403; }
        limit_req zone=admin_login_zone burst=2 nodelay;
        limit_req_status 429;
        try_files $uri /index.php$is_args$args;
    }

    # Rate-limited payment endpoint (5 req/min/IP, burst 3).
    location /api/custom/payments/ {
        if ($request_method = OPTIONS) {
            add_header 'Access-Control-Allow-Origin'  $cors_allowed_origin always;
            add_header 'Access-Control-Allow-Methods' 'GET, POST, PUT, PATCH, DELETE, OPTIONS' always;
            add_header 'Access-Control-Allow-Headers' 'Authorization, Content-Type, Accept, X-Personalization-Owner-Token, X-Support-Token' always;
            add_header 'Access-Control-Max-Age'       3600;
            add_header 'Content-Type'                 'text/plain; charset=utf-8';
            add_header 'Content-Length'               0;
            return 204;
        }
        limit_req zone=checkout_zone burst=3 nodelay;
        limit_req_status 429;
        try_files $uri /index.php$is_args$args;
    }

    # Sessions (30 req/min/IP, burst 8, per-session limits refined at app level).
    location /api/personalization/sessions {
        if ($request_method = OPTIONS) {
            add_header 'Access-Control-Allow-Origin'  $cors_allowed_origin always;
            add_header 'Access-Control-Allow-Methods' 'GET, POST, PUT, PATCH, DELETE, OPTIONS' always;
            add_header 'Access-Control-Allow-Headers' 'Authorization, Content-Type, Accept, X-Personalization-Owner-Token, X-Support-Token' always;
            add_header 'Access-Control-Max-Age'       3600;
            add_header 'Content-Type'                 'text/plain; charset=utf-8';
            add_header 'Content-Length'               0;
            return 204;
        }
        limit_req zone=sessions_zone burst=8 nodelay;
        limit_req_status 429;
        try_files $uri /index.php$is_args$args;
    }

    # Photo upload (5 req/min/IP, burst 2) — regex location wins over prefix.
    location ~ ^/api/personalization/sessions/[^/]+/photo$ {
        if ($request_method = OPTIONS) {
            add_header 'Access-Control-Allow-Origin'  $cors_allowed_origin always;
            add_header 'Access-Control-Allow-Methods' 'GET, POST, PUT, PATCH, DELETE, OPTIONS' always;
            add_header 'Access-Control-Allow-Headers' 'Authorization, Content-Type, Accept, X-Personalization-Owner-Token, X-Support-Token' always;
            add_header 'Access-Control-Max-Age'       3600;
            add_header 'Content-Type'                 'text/plain; charset=utf-8';
            add_header 'Content-Length'               0;
            return 204;
        }
        limit_req zone=upload_zone burst=2 nodelay;
        limit_req_status 429;
        try_files $uri /index.php$is_args$args;
    }

    # Auth endpoints (10 req/min/IP, burst 3).
    location ~ ^/api/v2/shop/customers/ {
        if ($request_method = OPTIONS) {
            add_header 'Access-Control-Allow-Origin'  $cors_allowed_origin always;
            add_header 'Access-Control-Allow-Methods' 'GET, POST, PUT, PATCH, DELETE, OPTIONS' always;
            add_header 'Access-Control-Allow-Headers' 'Authorization, Content-Type, Accept, X-Personalization-Owner-Token, X-Support-Token' always;
            add_header 'Access-Control-Max-Age'       3600;
            add_header 'Content-Type'                 'text/plain; charset=utf-8';
            add_header 'Content-Length'               0;
            return 204;
        }
        limit_req zone=auth_zone burst=3 nodelay;
        limit_req_status 429;
        try_files $uri /index.php$is_args$args;
    }

    # All other /api/ paths.
    location /api/ {
        if ($request_method = OPTIONS) {
            add_header 'Access-Control-Allow-Origin'  $cors_allowed_origin always;
            add_header 'Access-Control-Allow-Methods' 'GET, POST, PUT, PATCH, DELETE, OPTIONS' always;
            add_header 'Access-Control-Allow-Headers' 'Authorization, Content-Type, Accept, X-Personalization-Owner-Token, X-Support-Token' always;
            add_header 'Access-Control-Max-Age'       3600;
            add_header 'Content-Type'                 'text/plain; charset=utf-8';
            add_header 'Content-Length'               0;
            return 204;
        }
        try_files $uri /index.php$is_args$args;
    }

    location / {
        try_files $uri /index.php$is_args$args;
    }

    location ~ ^/index\.php(/|$) {
        fastcgi_pass 127.0.0.1:9000;
        fastcgi_split_path_info ^(.+\.php)(/.*)$;
        include fastcgi_params;
        fastcgi_param SCRIPT_FILENAME $realpath_root$fastcgi_script_name;
        fastcgi_param DOCUMENT_ROOT $realpath_root;
        fastcgi_read_timeout 300s;
        internal;

        add_header 'Access-Control-Allow-Origin'  $cors_allowed_origin always;
        add_header 'Access-Control-Allow-Methods' 'GET, POST, PUT, PATCH, DELETE, OPTIONS' always;
        add_header 'Access-Control-Allow-Headers' 'Authorization, Content-Type, Accept, X-Personalization-Owner-Token, X-Support-Token' always;

        add_header X-Content-Type-Options    "nosniff" always;
        add_header X-Frame-Options           "DENY" always;
        add_header Referrer-Policy           "strict-origin-when-cross-origin" always;
        add_header Permissions-Policy        "camera=(), microphone=(), geolocation=()" always;
    }

    location ~ \.php$ { return 404; }

    location ~* \.(css|js|png|jpg|jpeg|gif|webp|svg|ico|woff|woff2|ttf|otf|eot)$ {
        expires 2w;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    error_log /dev/stderr;
    access_log /dev/stdout;
}
