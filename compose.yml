services:
    php:
        image: little-chapters-backend-php:phase1
        depends_on:
            postgres:
                condition: service_healthy
        command: >
            sh -lc "mkdir -p /srv/sylius/public/media/cache /srv/sylius/var/cache /srv/sylius/var/log /srv/sylius/var/storage/personalizations/photos
            && chown www-data:www-data /srv/sylius/public/media /srv/sylius/public/media/cache /srv/sylius/var /srv/sylius/var/cache /srv/sylius/var/log /srv/sylius/var/storage /srv/sylius/var/storage/personalizations /srv/sylius/var/storage/personalizations/photos
            && php-fpm"
        healthcheck:
            test: ["CMD-SHELL", "pgrep -f 'php-fpm: master process' >/dev/null 2>&1 || exit 1"]
            timeout: 3s
            interval: 5s
            retries: 10
        environment:
            APP_ENV: ${APP_ENV:-dev}
            APP_SECRET: ${APP_SECRET:-phase1-local-secret}
            DATABASE_URL: pgsql://sylius:sylius@postgres:5432/little_chapters_sylius?serverVersion=16&charset=utf8
            MAILER_DSN: ${MAILER_DSN:-smtp://mailhog:1025}
            MESSENGER_TRANSPORT_DSN: ${MESSENGER_TRANSPORT_DSN:-doctrine://default}
            SYLIUS_MESSENGER_TRANSPORT_MAIN_DSN: ${SYLIUS_MESSENGER_TRANSPORT_MAIN_DSN:-doctrine://default}
            SYLIUS_MESSENGER_TRANSPORT_MAIN_FAILED_DSN: ${SYLIUS_MESSENGER_TRANSPORT_MAIN_FAILED_DSN:-doctrine://default?queue_name=main_failed}
            SYLIUS_MESSENGER_TRANSPORT_CATALOG_PROMOTION_REMOVAL_DSN: ${SYLIUS_MESSENGER_TRANSPORT_CATALOG_PROMOTION_REMOVAL_DSN:-doctrine://default?queue_name=catalog_promotion_removal}
            SYLIUS_MESSENGER_TRANSPORT_CATALOG_PROMOTION_REMOVAL_FAILED_DSN: ${SYLIUS_MESSENGER_TRANSPORT_CATALOG_PROMOTION_REMOVAL_FAILED_DSN:-doctrine://default?queue_name=catalog_promotion_removal_failed}
            SYLIUS_MESSENGER_TRANSPORT_PAYMENT_REQUEST_DSN: ${SYLIUS_MESSENGER_TRANSPORT_PAYMENT_REQUEST_DSN:-sync://}
            SYLIUS_MESSENGER_TRANSPORT_PAYMENT_REQUEST_FAILED_DSN: ${SYLIUS_MESSENGER_TRANSPORT_PAYMENT_REQUEST_FAILED_DSN:-sync://}
            PHP_DATE_TIMEZONE: ${PHP_DATE_TIMEZONE:-Europe/Brussels}
        volumes:
            - .:/srv/sylius:rw,cached
            - ./public:/srv/sylius/public:rw,delegated
            - public-media:/srv/sylius/public/media:rw

    assets:
        image: node:22-alpine
        working_dir: /srv/sylius
        command: >
            sh -lc "test -x node_modules/.bin/encore || npm install --no-audit --no-fund; npm run build"
        volumes:
            - .:/srv/sylius:rw,cached
            - ./public:/srv/sylius/public:rw,delegated

    postgres:
        image: postgres:16-alpine
        healthcheck:
            test: ["CMD-SHELL", "pg_isready -U sylius -d little_chapters_sylius"]
            timeout: 3s
            interval: 2s
            retries: 20
        environment:
            POSTGRES_DB: little_chapters_sylius
            POSTGRES_USER: sylius
            POSTGRES_PASSWORD: sylius
        ports:
            - "55432:5432"
        volumes:
            - postgres-data:/var/lib/postgresql/data:rw

    nginx:
        image: ghcr.io/sylius/sylius-nginx:latest
        depends_on:
            assets:
                condition: service_completed_successfully
            php:
                condition: service_healthy
        ports:
            - "8001:80"
        volumes:
            - ./public:/srv/sylius/public:ro
            - public-media:/srv/sylius/public/media:ro,nocopy
            - ./docker/nginx/default.conf.template:/etc/nginx/templates/default.conf.template:ro

    mailhog:
        image: mailhog/mailhog:latest
        ports:
            - "8026:8025"

    frontend:
        build:
            context: ../little-chapters-studio
            dockerfile: Dockerfile
        depends_on:
            nginx:
                condition: service_started
        environment:
            VITE_API_BASE_URL: /api
            VITE_BACKEND_PROXY_TARGET: http://nginx
            CHOKIDAR_USEPOLLING: "true"
        working_dir: /app
        command: >
            sh -lc "npm install --no-audit --no-fund && npm run dev -- --host 0.0.0.0 --port 8080"
        ports:
            - "8080:8080"
        volumes:
            - ../little-chapters-studio:/app:rw,cached
            - frontend-node-modules:/app/node_modules

volumes:
    postgres-data:
    public-media:
    frontend-node-modules:
