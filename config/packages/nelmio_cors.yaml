nelmio_cors:
    defaults:
        origin_regex: true
        allow_origin: ['%env(CORS_ALLOW_ORIGIN)%']
        allow_methods: ['GET', 'POST', 'PUT', 'PATCH', 'DELETE', 'OPTIONS']
        allow_headers:
            - 'Content-Type'
            - 'Authorization'
            - 'Accept'
            - 'X-Personalization-Owner-Token'
            - 'X-Support-Token'
        expose_headers: ['Link']
        max_age: 3600
    paths:
        # Sylius Shop API + Admin API + custom endpoints
        '^/api/':
            allow_origin: ['%env(CORS_ALLOW_ORIGIN)%']
            allow_headers:
                - 'Content-Type'
                - 'Authorization'
                - 'Accept'
                - 'X-Personalization-Owner-Token'
                - 'X-Support-Token'
            allow_methods: ['GET', 'POST', 'PUT', 'PATCH', 'DELETE', 'OPTIONS']
            max_age: 3600
