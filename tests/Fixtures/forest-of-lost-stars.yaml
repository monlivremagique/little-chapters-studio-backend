slug: forest-of-lost-stars
title: La foret des etoiles perdues
theme:
  - magic
  - courage
  - wonder
age: 4-7
story_subject: Un enfant aide des etoiles tombees a retrouver leur ciel.
main_emotion: emerveillement doux
learning_message: Meme les petits gestes peuvent illuminer le monde.
languages:
  - fr
  - en
