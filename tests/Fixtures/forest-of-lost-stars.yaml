scenes:
  - id: page_1
    moment: L'enfant decouvre une etoile tombee, toute pale, nichee dans les racines d'un grand chene. Il s'accroupit, les yeux grands ouverts.
  - id: page_2
    moment: Le renard roux guide l'enfant plus profond dans la foret. D'autres etoiles brillotent entre les fougeres.
  - id: page_3
    moment: La chouette sage explique que les etoiles ont besoin d'etre chantees pour retrouver leur chemin. L'enfant ecoute, concentre.
  - id: page_4
    moment: L'enfant chante doucement. Les etoiles s'elevent une a une, dessinant une spirale lumineuse dans le ciel — le moment magique et chaleureux du recit.
  - id: page_5
    moment: Le ciel est maintenant constellee. L'enfant et ses amis s'allongent dans la clairiere et regardent les etoiles retrouvees scintiller.
  - id: page_6
    moment: L'enfant rentre chez lui, paisible. Par la fenetre de sa chambre, il voit les etoiles lui faire un clin d'oeil. Il s'endort le coeur plein.
