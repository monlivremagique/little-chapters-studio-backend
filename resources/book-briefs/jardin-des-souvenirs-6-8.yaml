slug: jardin-des-souvenirs
title: Le jardin des souvenirs lumineux
theme:
  - magic
  - family
  - courage
  - empathy
age: 6-8
story_subject: Un enfant decouvre un jardin secret ou les souvenirs oublies poussent comme des fleurs lumineuses, et aide sa grand-mere a retrouver une joie qu'elle croyait perdue.
main_emotion: tendresse, mystere doux et courage du coeur
learning_message: Les souvenirs deviennent plus forts quand on les partage avec ceux qu'on aime.
languages:
  - fr
  - en
  - nl
visual_style: premium watercolor and gouache storybook, soft magical realism, warm Belgian garden, cinematic evening light
story_page_count: 6
constraints:
  - bedtime safe for 6-8
  - emotionally rich but never sad or frightening
  - Belgian premium quality
  - coherent hero design across pages
  - coherent grandmother design across pages
  - no text inside generated images
  - no visible letters, signs, logos or readable labels in images
  - avoid scary shadows, ghosts, graves, hospitals or death imagery
  - poetic but clear language, age-appropriate for 6-8
  - strong visual variety between pages
  - every page must contain a clear action and emotion

arc_type: mystery-to-healing
climax_page: page_5
setting: une maison belge chaleureuse avec bow-window, un vieux jardin cache derriere une haie, une serre ancienne, un etang calme et une terrasse sous les guirlandes du soir
cultural_context: Belgique premium — maison familiale en briques, jardin humide apres la pluie, hortensias, gaufres du dimanche, douceur intergenerationnelle
parent_emotion_goal: Le parent veut que l'enfant ressente la valeur des liens familiaux, de l'ecoute et des petits gestes qui reconfortent.

secondary_characters:
  - Mamie Alma, grand-mere douce aux cheveux argentés, tablier clair, regard un peu reveur puis lumineux
  - Miso, un petit chat tigré curieux qui suit l'enfant partout
  - une luciole dorée gardienne du jardin, expressive mais non parlante

scenes:
  - id: page_1
    moment: >-
      L'enfant remarque que Mamie Alma regarde son vieux jardin sans sourire. Sur la table,
      une tasse de chocolat refroidit. Miso le chat pousse doucement la porte entrouverte,
      comme s'il invitait l'enfant a le suivre.
  - id: page_2
    moment: >-
      Derriere la haie, l'enfant decouvre un passage secret couvert de feuilles brillantes.
      Miso bondit devant lui. Au bout du chemin, une petite luciole dorée eclaire une grille
      ancienne envahie par les roses.
  - id: page_3
    moment: >-
      Dans le jardin cache, des fleurs transparentes flottent au-dessus de la mousse.
      Chaque fleur contient une petite scene lumineuse: un rire, une danse sous la pluie,
      une gaufre partagee. L'enfant tend la main, emerveille mais prudent.
  - id: page_4
    moment: >-
      L'enfant comprend qu'une grande fleur bleue garde un souvenir de Mamie Alma:
      elle jeune, riant sous une tonnelle avec un ruban dans les cheveux. Mais la fleur
      se referme car personne ne se rappelle la chanson du moment.
  - id: page_5
    moment: >-
      L'enfant revient avec Mamie Alma dans le jardin secret. Ensemble, ils fredonnent
      une melodie simple. La fleur bleue s'ouvre en pluie d'etincelles chaudes, illuminant
      les visages de Mamie Alma, de l'enfant et de Miso. C'est le grand moment magique.
  - id: page_6
    moment: >-
      Le soir, sur la terrasse, Mamie Alma raconte son souvenir retrouvé pendant que
      l'enfant colle une petite fleur lumineuse dans un pot pres de la fenetre. Les guirlandes
      brillent doucement, Miso dort en boule, et toute la maison semble respirer la paix.
