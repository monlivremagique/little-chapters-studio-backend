slug: bonne-nuit
title: Bonne Nuit, {child_name}
theme:
- bedtime
- dreams
- calm
story_subject: 'As dusk paints the Belgian neighbourhood in shades of amber and violet, {child_name} follows a gentle bedtime
  ritual: warm pyjamas, brushing teeth, a cup of lait à la camomille, saying goodnight to toys, garden animals, the moon and
  stars. Each ''Bonne nuit'' brings {child_name} closer to sleep — until the bedroom transforms into a dreamscape of clouds
  and starlight, and {child_name} drifts into peaceful dreams.'
main_emotion: serenity
learning_message: Nighttime is a gentle friend, not something to fear. Saying goodnight to the world around us — the flowers,
  the animals, the moon — helps us feel safe, loved, and ready for the sweetest dreams.
languages:
- fr
- en
- nl
visual_style: Aquarelle belge premium — ligne claire inspirée Hergé/Tintin, aquarelle chaude façon Marcel Marlier/Martine,
  couleurs profondes et lumineuses, texture de papier aquarelle, personnages expressifs, arrière-plans détaillés type Forêt
  de Soignes ou rue bruxelloise
story_page_count: 20
constraints:
- Repetitive, soothing structure for toddlers
- Very short text — 1-2 short sentences per page
- Soft, warm colours only — no bright or jarring imagery
- Each page follows 'Bonne nuit, [something]' pattern in FR
- No generic descriptions. Every visual detail must be specific — textures, colours, lighting, camera angle.
- Each scene's emotion must be clearly stated in a short phrase (e.g., 'wonderment', 'determination', 'joy').
- The hero's appearance must remain consistent across all pages — same hair colour, eye colour, clothing style.
- Avoid ambiguous phrasing that could lead to inconsistent image generation.
- 'The story arc must be unbroken: setup → rising action → climax → resolution with clear emotional progression.'
- Repetitive, soothing structure — each page follows 'Bonne nuit, [something]' pattern.
- Very short text — 1-2 short sentences per page. Max 15 words.
- Soft, warm colours only — deep blues, lavender, amber, cream — no bright or jarring imagery.
- 'The colour palette darkens page by page: golden sunset → soft twilight → deep night → dreamy silver.'
- '{child_name} wears soft blue pyjamas with stars throughout.'
- The bunny plush is a consistent companion in every scene.
arc_type: comfort-to-courage
climax_page: page_14
setting: A cosy Belgian home — a child's bedroom, kitchen, garden, the night sky
cultural_context: The house is a classic Belgian maison with a pitched slate roof and white shutters. The garden has a beech
  tree with a wooden bench beneath it. The child drinks lait à la camomille warm from a traditional Belgian gobelet. In the
  distance, a carillon plays from a nearby church tower — a sound that defines Belgian evenings for anyone who has visited
  Brussels or Bruges.
parent_emotion_goal: Deep serenity — this book is designed to be the final step in the parent's own bedtime routine. The rhythmic
  'Bonne nuit' structure calms both parent and child. The dream sequence gives parents a moment of quiet awe. By the final
  page, both reader and listener should be breathing slower, calmer, ready for rest.
scenes:
- id: page_1
  moment: 'EMOTION: peaceful transition. The sun sets over a quiet Belgian neighbourhood. Rooftops with pitched slate tiles
    catch the last orange light. Warm amber glow fills {child_name}''s bedroom through lace curtains. The day is ending, soft
    and slow. A carillon plays in the distance — a gentle, melodic toll. {child_pronoun_subject} feels a surge of emotion.'
- id: page_2
  moment: 'EMOTION: cosy comfort. Maman helps {child_name} put on soft blue pyjamas with tiny embroidered stars. {child_name}
    yawns — a big, open-mouthed yawn — and hugs a plush bunny with floppy ears. The bunny is well-loved, slightly worn. The
    nightlight — a crescent moon shape — glows on the wall. {child_pronoun_subject} feels a surge of emotion.'
- id: page_3
  moment: 'EMOTION: quiet routine. {child_name} stands on a small wooden stool in the bathroom, brushing teeth. The crescent
    moon nightlight casts soft golden light. The tap drips slowly — plip... plip... plip. A small towel with {child_name}''s
    name embroidered hangs on the rack. {child_pronoun_subject} feels a surge of emotion.'
- id: page_4
  moment: 'EMOTION: warm comfort. In the kitchen, Papa warms a small cup of lait à la camomille on the stove. Steam curls
    upward lazily. The kitchen clock reads 19:30. On the counter, a plate with two speculoos — a bedtime tradition. The kitchen
    is warm, dim, safe.'
- id: page_5
  moment: 'EMOTION: snug contentment. {child_name} sits at the kitchen table, holding the warm cup with both hands, blowing
    gently on the steam. Speculoos crumbs dot the plate. Maman sits beside them, stroking {child_name}''s hair gently. The
    bunny sits on the table, watching.'
- id: page_6
  moment: 'EMOTION: soft goodbye to play. In the living room, {child_name} kneels and says goodnight to the toys scattered
    on the rug: a teddy bear, a wooden train, a stack of picture books. ''Bonne nuit, mes amis.'' {child_name} tucks the teddy
    bear under a small blanket.'
- id: page_7
  moment: 'EMOTION: connection with nature. {child_name} stands at the garden door, open just a crack. The tulips have closed
    their petals for the night. A ladybug sleeps curled on a green leaf. The beech tree rustles gently, as if saying goodnight
    too.'
- id: page_8
  moment: 'EMOTION: gentle wonder. In the garden, a hedgehog peeks from behind a hydrangea bush, nose twitching. {child_name}
    waves. ''Bonne nuit, petit hérisson.'' The hedgehog curls up sleepily, a round ball of spikes. The bunny waves too, held
    up by {child_name}.'
- id: page_9
  moment: 'EMOTION: looking up in wonder. {child_name} tips {child_possessive_det} head back. The first stars pierce the violet
    sky. A crescent moon — impossibly thin, glowing amber — hangs above the rooftops. ''Bonne nuit, lune.'' The moon seems
    to glow a little brighter in response.'
- id: page_10
  moment: 'EMOTION: peaceful counting. {child_name} counts stars on {child_possessive_det} fingers — one, two, three. Each
    star twinkles. The carillon plays again — a lullaby this time — the notes floating across the neighbourhood like seeds
    on the wind. {child_name}''s eyelids feel heavy.'
- id: page_11
  moment: 'EMOTION: safe and tucked-in. {child_name} climbs into bed — a fluffy white duvet with embroidered stars and a satin
    trim. Maman tucks the duvet up to {child_name}''s chin. The bunny is tucked in beside them, its head on the pillow. {child_name}
    makes sure the bunny is comfortable too.'
- id: page_12
  moment: 'EMOTION: drifting. Maman sits on the edge of the bed, a storybook open on her lap. Soft lamplight illuminates the
    pages. {child_name}''s eyes are half-open, heavy. Maman''s voice is a low, soothing hum. The words blur into the comfort
    of her presence.'
- id: page_13
  moment: 'EMOTION: pure love. Maman leans down and kisses {child_name}''s forehead — warm, lingering. ''Je t''aime, mon trésor.''
    Papa appears in the doorway, blows a kiss. {child_name}''s eyes are barely open, but a small smile forms. The bunny is
    clutched close.'
- id: page_14
  moment: 'EMOTION: transcendent peace — CLIMAX. {child_name} drifts off. The bedroom dissolves softly into a dreamscape.
    Soft clouds — pink, lavender, silver — float through the walls. Stars circle the bed in a slow spiral. The moon — huge,
    golden, warm — glows through the window like the world''s gentlest nightlight. {child_name} floats upward, weightless,
    safe.'
- id: page_15
  moment: 'EMOTION: floating freedom. {child_name} floats on a soft cloud over the sleeping town. Rooftops pass below — pitched
    tiles, chimney pots, a church steeple. The beech tree in their garden is a dark green blob. Everything is bathed in silver-blue
    moonlight. A train rumbles softly in the distance.'
- id: page_16
  moment: 'EMOTION: eternal safety — resolution. Close-up of {child_name} sleeping peacefully, clutching the bunny. The moon
    shines through the window, casting a silver beam across the bed. The lace curtain shadows dance on the wall. The last
    words: ''Bonne nuit, {child_name}. Fais de beaux rêves.'''
- id: page_17
  moment: 'EMOTION: dreamy drifting. {child_name} stirs gently in sleep, a soft smile on their face. In the dream, {child_name}
    floats past the carillon tower — the bells chime a low, gentle lullaby. The notes ripple through the clouds like ripples
    on a pond.'
- id: page_18
  moment: 'EMOTION: starry wonder. In the dream, {child_name} visits the stars one by one. Each star greets them in a different
    voice — some high, some low. One star is shaped like a bunny. {child_name} waves. The moon watches over everything, warm
    and golden.'
- id: page_19
  moment: 'EMOTION: returning to safety. The dream softens. {child_name} is back in their own bed. From the hallway, Maman''s
    voice floats: ''Je t''aime, mon ange.'' {child_name} snuggles deeper under the duvet, pulling the bunny close. The house
    is quiet. All is well.'
- id: page_20
  moment: 'EMOTION: ultimate calm — final. The moon casts a silver beam through the lace curtains onto {child_name}''s sleeping
    face. The beech tree rustles once, then settles. The carillon plays one final, soft note that hangs in the air. Then:
    silence. The last words, hand-lettered: ''Bonne nuit, {child_name}. Fais de beaux rêves.'''
age: 1-4
