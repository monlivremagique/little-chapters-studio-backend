slug: la-derniere-etoile-filante
title: La derniere etoile filante
theme:
  - family
  - wonder
  - courage
  - nature
age: 4-7
story_subject: Un enfant et son grand-père suivent la piste d'une étoile filante à travers la campagne belge au crépuscule, pour exaucer un vœu qui fera refleurir bien plus qu'un jardin.
main_emotion: tendresse, émerveillement crépusculaire et douce mélancolie positive
learning_message: Les plus beaux vœux sont ceux qu'on fait pour les autres.
languages:
  - fr
  - en
  - nl
visual_style: premium watercolor and gouache storybook, warm twilight and dusk tones, golden wheat fields, soft violet skies, misty river landscapes, Belgian countryside at blue hour, firefly-lit paths
story_page_count: 6
constraints:
  - bedtime safe for 4-7
  - emotionally warm, gentle bittersweet but resolved positively
  - Belgian premium quality — authentic Ardennes-Campine countryside
  - coherent hero design across all pages
  - coherent grandfather design across all pages
  - coherent grey heron design across all pages
  - no text inside generated images
  - no visible letters, signs, logos or readable labels in images
  - no death, illness, or permanent loss — focus on renewal and hope
  - poetic clear language, age-appropriate for 4-7
  - "strong visual variety between pages: village → fields → river → forest → star landing"
  - every page must contain a clear action and visible emotion
  - warm, safe, gentle atmosphere throughout
  - progression from golden hour through twilight to starry night
arc_type: ordinary-to-extraordinary
climax_page: page_5
setting: une maison de campagne belge avec véranda, des champs de blé doré, un chemin creux, une rivière bordée de saules, un vieux pont de pierre, une clairière au bord de l'eau sous un ciel étoilé
cultural_context: Belgique premium — maison de campagne en briques typique de la Campine, champs de blé du Brabant wallon, héron cendré des rivières belges, grand-père et petit-enfant, rituel du soir d'été en Belgique, ciel étoilé au-dessus des Ardennes
parent_emotion_goal: Le parent veut que l'enfant ressente que donner pour les autres est plus puissant que recevoir, et que l'amour se cache dans les gestes simples du quotidien.
secondary_characters:
  - Grand-père Jules, cheveux blancs ébouriffés, barbe douce, veste en tweed, yeux pétillants de malice, canne en bois sculpté
  - Un héron cendré majestueux, guide silencieux au long bec fin, œil ambré et sage
scenes:
  - id: page_1
    moment: >-
      Dans le jardin au crépuscule doré, Grand-père Jules montre une étoile filante à
      l'enfant. "Si on la suit jusqu'au bout, elle exauce un vœu", murmure-t-il.
      L'enfant attrape la main du grand-père, les yeux pleins d'étoiles.
      Derrière eux, le potager fatigué de Grand-père a besoin d'un miracle.
  - id: page_2
    moment: >-
      La piste lumineuse traverse un champ de blé baigné de lumière dorée.
      L'enfant et Grand-père Jules marchent entre les épis qui chuchotent.
      Le héron cendré les observe depuis un vieux saule, inclinant la tête
      comme s'il les invitait à le suivre. Les coquelicots rouges dansent dans le vent.
  - id: page_3
    moment: >-
      Au bord de la rivière, le héron les guide vers un vieux pont de pierre.
      La lumière a changé — le ciel vire au violet et les premières lucioles
      apparaissent. L'enfant voit la piste de l'étoile se refléter sur l'eau
      calme. Grand-père Jules s'arrête, souffle un peu, mais son regard brille
      de détermination douce.
  - id: page_4
    moment: >-
      Dans la forêt qui s'assombrit, les lucioles tracent un chemin magique.
      L'enfant a un peu peur du noir. Grand-père Jules serre doucement sa main.
      "Le courage, c'est d'avancer même quand on a peur", dit-il. Le héron,
      perché sur une branche basse, attend patiemment. La piste de l'étoile
      brille plus fort devant eux.
  - id: page_5
    moment: >-
      Dans une clairière baignée de lumière lunaire, l'étoile filante repose
      doucement dans l'herbe, palpitant d'une lueur chaude — elle n'est pas
      tombée, elle s'est posée. Le moment magique. L'enfant comprend que le
      vœu ne doit pas être pour soi. Fermant les yeux, il formule silencieusement:
      "Que le jardin de Grand-père refleurisse". L'étoile s'élève, dessinant
      une spirale de lumière dorée.
  - id: page_6
    moment: >-
      Le lendemain matin, le jardin de Grand-père Jules est transformé: des
      fleurs partout, des couleurs vives, le potager déborde de vie. Grand-père
      Jules regarde l'enfant avec des yeux qui brillent plus que les étoiles.
      Sous le vieux pommier, le héron les observe une dernière fois avant
      de s'envoler. L'enfant sait que le vrai cadeau, c'était le voyage ensemble.
