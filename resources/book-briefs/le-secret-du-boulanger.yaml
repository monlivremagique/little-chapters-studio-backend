slug: le-secret-du-boulanger
title: Le secret du boulanger
theme:
  - family
  - kindness
  - community
  - wonder
age: 3-7
story_subject: Chaque samedi, un enfant visite la boulangerie du quartier avec sa grand-mère. Le boulanger connaît le secret de chacun — mais quel est le sien ? En découvrant que chaque pâtisserie contient un peu d'amour et de souvenir, l'enfant comprend que le vrai secret, c'est de partager ce qu'on a de plus précieux.
main_emotion: chaleur, tendresse et émerveillement gourmand
learning_message: Les plus beaux cadeaux ne s'achètent pas — ils se fabriquent avec amour et se partagent avec le cœur.
languages:
  - fr
  - en
  - nl
visual_style: premium watercolor and gouache storybook, warm bakery tones, golden morning light, cozy Belgian interiors, butter-yellow and terracotta palette, cinematic close-ups on flour-dusted hands and golden pastries
story_page_count: 6
constraints:
  - bedtime safe for 3-7
  - emotionally warm, never sad or frightening
  - Belgian premium quality — cozy, authentic, intergenerational
  - coherent hero design across all pages
  - coherent grandmother design across all pages
  - coherent baker character design across all pages
  - no text inside generated images
  - no visible letters, signs, logos or readable labels in images
  - no illness or hospital imagery — baker is simply un peu fatigue
  - poetic but clear language, age-appropriate for 3-7
  - strong visual variety between pages
  - every page must contain a clear action and visible emotion
  - must NOT show cash registers, money, prices, or payment
  - warm, safe, cozy atmosphere throughout
arc_type: ordinary-to-extraordinary
climax_page: page_5
setting: une boulangerie belge chaleureuse avec vitrine en bois, un fournil doré, une cuisine familiale cosy, un jardin de grand-mère avec un vieux pommier, une rue pavée d'un quartier belge tranquille
cultural_context: Belgique premium — rituel du samedi matin à la boulangerie, grand-mère et petit-enfant, spéculoos maison, chaleur du fournil, quartier résidentiel belge avec maisons en briques, tablier fleuri de grand-mère, odeur de pain chaud et de cannelle
parent_emotion_goal: Le parent veut que l'enfant ressente la valeur des traditions familiales, du partage, et de la transmission des petits gestes d'amour qui traversent les générations.
secondary_characters:
  - Mamie Rose, grand-mère aux cheveux argentés tressés, tablier à fleurs bleues, mains toujours farineuses, regard pétillant
  - Monsieur Claudio, le boulanger, grand tablier blanc, moustache gaie, mains fortes et douces, un peu fatigué mais toujours souriant
  - Timur, le chat du quartier, roux et paresseux, toujours couché devant la boulangerie
scenes:
  - id: page_1
    moment: >-
      Samedi matin. L'enfant et Mamie Rose marchent main dans la main dans la rue pavée.
      Devant la boulangerie, Timur le chat roux s'étire au soleil. Une odeur chaude de
      pain et de cannelle flotte dans l'air. L'enfant presse le pas, tout excité.
  - id: page_2
    moment: >-
      Dans la boulangerie lumineuse, Monsieur Claudio sert chaque client avec un mot doux.
      Au facteur triste, il donne un pain au chocolat "pour le sourire". À la petite fille
      timide, un spéculoos "pour le courage". L'enfant observe, intrigué par ce secret.
  - id: page_3
    moment: >-
      Monsieur Claudio invite l'enfant dans le fournil. Sur le plan de travail fariné,
      il façonne la pâte avec des gestes lents et précis. Il montre à l'enfant comment
      un peu de beurre, un peu de sucre, et surtout un souvenir heureux rendent
      chaque pâtisserie spéciale. La lumière dorée entre par la fenêtre.
  - id: page_4
    moment: >-
      Un samedi, la boulangerie est fermée. Un petit mot sur la porte dit "À bientôt".
      Mamie Rose a les yeux doux mais un peu tristes. Avec ce qu'il a appris, l'enfant
      a une idée: et s'ils préparaient eux-mêmes la pâtisserie préférée de Monsieur Claudio
      pour lui redonner le sourire ? Dans la cuisine de Mamie, ils rassemblent les ingrédients.
  - id: page_5
    moment: >-
      Dans la cuisine inondée de soleil, l'enfant et Mamie Rose préparent ensemble.
      Farine partout, un peu de pagaille, mais beaucoup de rires. L'enfant ajoute son
      ingrédient secret — une framboise du jardin de Mamie. Ensemble, ils glissent
      leur création dans le four. La cuisine embaume. C'est le grand moment lumineux
      et chaleureux du récit.
  - id: page_6
    moment: >-
      Monsieur Claudio revient. Devant sa boulangerie, l'enfant lui offre la pâtisserie
      préparée avec Mamie Rose. Le boulanger goûte, ferme les yeux, et un grand sourire
      éclaire son visage fatigué. "Tu as trouvé le secret", dit-il doucement. Ce soir-là,
      toute la famille partage un goûter ensemble autour du vieux pommier du jardin.
