slug: ville-ecole
title: Mon grand jour en ville
theme:
  - everyday-hero
  - friendship
  - confidence
age: 3-5
story_subject: Un tout-petit fait sa premiere grande journee en ville avec son parent et decouvre qu'il est plus courageux qu'il ne le pensait.
main_emotion: fierte douce et securite
learning_message: Etre courageux c'est faire une petite chose de nouveau, un pas a la fois.
languages:
  - fr
  - en
  - nl
visual_style: premium gouache illustration warm urban storybook
story_page_count: 6
constraints:
  - bedtime safe
  - age-appropriate for 3-5
  - Belgian premium quality
  - coherent hero across pages
  - no text inside generated images
  - very short sentences, max 8 words per line

arc_type: comfort-to-courage
climax_page: page_4
setting: une belle ville belge par une matinee ensoleillee — trams, marche, boulangerie, parc
cultural_context: Belgique premium — architecture Art-Nouveau, marche local, boulangerie artisanale, chaleur familiale
parent_emotion_goal: Le parent veut que l'enfant sente que sortir dans le monde est une aventure belle et rassurante

secondary_characters:
  - un pigeon voyageur facetieux
  - la dame de la boulangerie avec un sourire chaud

scenes:
  - id: page_1
    moment: L'enfant tient la main de son parent sur le pas de la porte. La ville s'etend devant eux, grande et lumineuse. Il serre un peu plus fort.
  - id: page_2
    moment: Au marche, un pigeon facetieux vole le chapeau du parent. L'enfant rit et court le recuperer, fier de lui.
  - id: page_3
    moment: A la boulangerie, l'enfant commande seul son croissant pour la premiere fois. Sa voix tremble un peu, puis sort claire.
  - id: page_4
    moment: Dans le parc, l'enfant grimpe seul en haut du toboggan et pousse un grand cri de victoire en descendant. Le parent applaudit.
  - id: page_5
    moment: Sur le chemin du retour, l'enfant donne la main au parent, mais cette fois c'est lui qui marche en premier, en comptant les trams.
  - id: page_6
    moment: A la maison, l'enfant raconte sa journee a son doudou. Il s'endort avec un grand sourire, satisfait de son courage.
