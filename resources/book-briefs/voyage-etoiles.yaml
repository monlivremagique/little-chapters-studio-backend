slug: voyage-etoiles
title: Le Voyage de {child_name} vers les Étoiles
theme:
- space
- science
- dreams
story_subject: 'In their Belgian backyard under a starry sky, {child_name} builds a spaceship from a cardboard box, a colander,
  a lampshade, and tin foil — and blasts off on an epic tour of the solar system. With Pepin, a lamp-robot co-pilot, they
  visit Mercury''s craters, Venus'' swirling clouds, Earth as a blue marble, Mars'' red canyons, Jupiter''s Great Red Spot,
  Saturn''s diamond rings, Uranus on its side, and wild blue Neptune. At the Atomium Station, they meet Zibbie — a friendly
  alien — who gives them a star map and a profound truth: the journey of discovery never ends.'
main_emotion: awe
learning_message: 'The universe is vast and full of wonder, but the most amazing journey begins with imagination — and a cardboard
  box. Curiosity is the fuel that takes you anywhere. Look up, wonder, explore: the stars are not as far as they seem.'
languages:
- fr
- en
- nl
visual_style: Aquarelle belge premium — ligne claire inspirée Hergé/Tintin, aquarelle chaude façon Marcel Marlier/Martine,
  couleurs profondes et lumineuses, texture de papier aquarelle, personnages expressifs, arrière-plans détaillés type Forêt
  de Soignes ou rue bruxelloise
story_page_count: 28
constraints:
- Scientifically accurate planets — no humanoid aliens on actual planets
- Friendly aliens appear on a space station only
- Space should feel wondrous, not empty or scary
- The spaceship is clearly made of household items (cardboard, colander, etc.)
- Each planet gets at least 2 pages
- Include basic age-appropriate scientific facts
- No generic descriptions. Every visual detail must be specific — textures, colours, lighting, camera angle.
- Each scene's emotion must be clearly stated in a short phrase (e.g., 'wonderment', 'determination', 'joy').
- The hero's appearance must remain consistent across all pages — same hair colour, eye colour, clothing style.
- Avoid ambiguous phrasing that could lead to inconsistent image generation.
- 'The story arc must be unbroken: setup → rising action → climax → resolution with clear emotional progression.'
- Scientifically accurate planets — correct colours, relative sizes, and features (rings, spots, tilts).
- Friendly aliens appear ONLY at the Atomium Station — not on actual planets.
- Space should feel wondrous, colourful, and inviting — never empty, cold, or scary.
- The spaceship is clearly a cardboard box with a colander control panel, lampshade dome, and tin foil hull.
- Each planet gets 1-2 pages with at least one scientifically interesting fact integrated.
- '{child_name} wears a bicycle helmet (silver) and a red scarf throughout the space journey.'
- Pepin the lamp-robot has a single eye (the bulb) and a box body — consistent design every page.
- 'FORBIDDEN in FR locale: ''lui'', ''elle'', ''ils'', ''son'', ''sa'', ''ses'' for the child hero. Use {child_name} or ''l''enfant''
  uniquement.'
- 'FORBIDDEN in NL locale: ''haar'', ''zijn'' for the child hero. Use {child_possessive_det} or {child_name}.'
- 'FORBIDDEN in EN locale: ''his'', ''her'', ''he'', ''she'' for the child hero. Use {child_name} or they/them.'
- 'NL HARD RULE: Never write NL as a French translation. Example: BAD="Il traverse le pont" → BAD NL="Hij steekt de brug over"
  → GOOD NL="{child_name} wandelt over de brug".'
- 'NL HARD RULE: Use Flemish vocabulary: patat (not frites/friet), seffens (not straks), een keer (not even), schoon (not
  mooi) for casual speech.'
- 'NL HARD RULE: Avoid French sentence skeletons in NL: no "Il y a", "C''est", "Pour", "Dans", "Avec", "Mais", "Leur", "Qui".
  Use native NL structures.'
- 'NL HARD RULE: Subject-verb inversion after fronting: "Dan loopt {child_name}" NOT "Dan {child_name} loopt". SOV in subordinate:
  "...dat {child_name} een framboos plukt" NOT "...dat {child_name} plukt een framboos".'
arc_type: quest-with-revelation
climax_page: page_22
setting: A Belgian home, a backyard, the solar system (Mercury → Venus → Earth → Mars → Jupiter → Saturn → Uranus → Neptune
  → space station → constellations)
cultural_context: 'The spaceship is built in a classic Belgian backyard with a beech tree, a wooden fence, and a patch of
  lawn. The constellations section references the Northern Hemisphere sky as seen from Belgium: the Big Dipper (Grande Ourse),
  Orion, Cassiopeia. The space station is a clear homage to the Atomium in Brussels — a friendly alien lives in an atom-shaped
  station where spheres become habitats connected by glowing tubes.'
parent_emotion_goal: Pure wonder — the parent re-discovers the magic of the universe through their child's eyes. The cardboard-box
  spaceship is a universal childhood memory that will resonate deeply. The Atomium Station encounter adds a Belgian-specific
  heart. The final pages — stargazing with Papa, the star map on the nightstand — are designed to make parents feel the preciousness
  of their child's imagination.
secondary_characters:
- Pepin — Robot co-pilot made from a colander and a lamp
- Zibbie — Friendly alien from the Atomium Station
scenes:
- id: page_1
  moment: 'EMOTION: dreamy longing. {child_name} gazes out the bedroom window at a star-filled Belgian sky. A small telescope
    points at the waxing moon. On the desk: books about planets — ''Le Système Solaire'', ''Les Étoiles'' — splayed open.
    A poster of the solar system glows faintly on the wall. {child_name} traces a finger over Saturn''s rings on the poster.
    ''I want to go there,'' {child_pronoun_subject} whispers.'
- id: page_2
  moment: 'EMOTION: creative excitement. The living room floor is a construction zone. A large cardboard box, a silver colander,
    a lamp with a white shade, rolls of tin foil, string, tape. The family dog watches with a tilted head. {child_name} sorts
    through the materials — this will be the hull, this the control panel, this the dome.'
- id: page_3
  moment: 'EMOTION: proud creation. In the backyard under the beech tree, the spaceship takes shape. The colander is bolted
    to the cardboard box — knobs and dials drawn with marker. The lampshade is the dome. Tin foil wraps the ''hull'' in shiny
    panels. Pepin the robot is assembled: a desk lamp head on a cardboard box body, with googly eyes drawn on the lampshade.
    {child_name} stands back, admiring.'
- id: page_4
  moment: 'EMOTION: thrilling launch sequence. {child_name} and Pepin (on {child_name}''s lap) sit inside the cardboard cockpit.
    {child_name} wears a silver bicycle helmet. Pepin''s lamp-head flickers. {child_name} presses a button drawn on the colander.
    ''3… 2… 1… DÉCOLLAGE!'' The dog barks. The beech tree rustles.'
- id: page_5
  moment: 'EMOTION: accelerating wonder. The backyard blurs — the beech tree becomes a green smear. The house shrinks to a
    dollhouse, then a dot. The sky shifts from blue to deep indigo to star-speckled black. Below, Belgium is a patchwork of
    green fields and tiny village lights. {child_name}''s mouth forms a silent ''wow.'''
- id: page_6
  moment: 'EMOTION: curious discovery. ''MERCURY — A grey, cratered world fills the window. The sun blazes HUGE — four times
    larger than on Earth — in the black sky. {child_name} squints. Pepin''s lamp beeps, ''Mercury is the smallest planet!
    A year here is only 88 Earth days!'' {child_name} spots a crater shaped like a heart.'
- id: page_7
  moment: 'EMOTION: mysterious awe. ''VENUS — The ship passes through a layer of swirling yellow-white clouds — sulphuric
    acid, Pepin beeps, but don''t worry, we''re protected!'' Through breaks in the clouds, a dim, hot surface glows. Zap —
    lightning crackles below. ''Venus spins backwards!'' Pepin beeps. {child_name} presses their nose to the window.'
- id: page_8
  moment: 'EMOTION: tender homesickness. ''EARTH — From space, it''s a perfect blue and white marble with patches of green.
    {child_name} squints — there! Belgium — a tiny green patch with a speck of Brussels. Pepin beeps softly: ''C''est la plus
    belle planète.'' {child_name} feels a pang of longing. {child_pronoun_subject} touches the window.'
- id: page_9
  moment: 'EMOTION: red planet wonder. ''MARS — The entire window is filled with rust-red landscape. Olympus Mons, the tallest
    mountain in the solar system, rises in the distance. Valles Marineris, a canyon system, stretches across the surface.
    {child_name} imagines tiny rovers. Pepin''s lamp glows red in the Martian light.'
- id: page_10
  moment: 'EMOTION: playful navigation. ''THE ASTEROID BELT — Rocks of all sizes float past the window. One asteroid is shaped
    EXACTLY like a potato — complete with dimples. Pepin''s lamp swivels left and right as he ''dodges'' them playfully. {child_name}
    steers with the colander wheel, giggling.'
- id: page_11
  moment: 'EMOTION: majestic scale. ''JUPITER — The view is BREATHTAKING. A giant striped orb fills the window — bands of
    orange, cream, russet, white. The Great Red Spot — a storm bigger than Earth — stares like a giant eye. Pepin beeps: ''Jupiter
    could fit 1,000 Earths inside!'''
- id: page_12
  moment: 'EMOTION: distant connection. ''JUPITER''S MOONS — Four small orbs orbit the giant: Io (yellow, volcanic), Europa
    (icy, cracked, mysterious), Ganymede (the biggest moon in the solar system), Callisto (cratered, ancient). {child_name}
    waves at Europa. ''Maybe there are fish under that ice!'''
- id: page_13
  moment: 'EMOTION: pure wonderment. ''SATURN — The most magnificent sight in the solar system. The rings — made of billions
    of ice and rock particles — shimmer in gold, silver, and pale rose. They stretch 200,000 km but are only 10 metres thick.
    {child_name}''s mouth drops open. Pepin is silent — even the lamp robot is in awe.'
- id: page_14
  moment: 'EMOTION: intimate proximity. The ship flies UNDER Saturn''s rings. Tiny ice particles glitter like diamonds against
    the blackness — {child_name} reaches out as if to touch them. In the distance, the orange moon Titan glows. The rings
    above them are a golden canopy.'
- id: page_15
  moment: 'EMOTION: giggling at nature. ''URANUS — A pale blue, featureless world that ROLLS through space on its side — like
    a sleepy ball rolling down a hill. Pepin beeps: ''Uranus rotates on its side! Its axial tilt is 98 degrees!'' {child_name}
    giggles. ''It looks like it''s tired.'''
- id: page_16
  moment: 'EMOTION: wild beauty. ''NEPTUNE — Deep blue, wild, with white clouds streaking across its surface. Winds here are
    the fastest in the solar system — 2,000 km/h. Pepin''s lamp flickers — it''s c-c-cold here. {child_name} shivers dramatically
    and wraps the red scarf tighter. The farthest planet. Beautiful and alone.'
- id: page_17
  moment: 'EMOTION: edge-of-the-world awe. ''BEYOND NEPTUNE — The edge of the solar system. Stars grow denser — the Milky
    Way stretches across the sky like a luminous river. ''The solar system ends here,'' beeps Pepin softly. ''{child_name}
    — but space goes on forever.'' A moment of profound silence as they contemplate infinity.'
- id: page_18
  moment: 'EMOTION: amazed recognition. ''ATOMIUM STATION — A giant metal structure shaped like an atom — nine spheres connected
    by glowing tubes — gleams against the stars. It''s the Atomium, but in SPACE. Lights pulse along its spheres. A docking
    bay opens like a welcoming mouth. {child_name} gasps. ''That''s Brussels!'''
- id: page_19
  moment: 'EMOTION: instant friendship. Zibbie floats out of the docking bay — a small, glowing being with large silver eyes,
    gentle antennae, and translucent wings. It makes musical beeps — like a celestial music box. Pepin beeps back — they can
    communicate! Zibbie''s antennae glow brighter as it sees {child_name}. It extends a tiny, glowing hand.'
- id: page_20
  moment: 'EMOTION: cosmic connection. Inside Atomium Station — a viewing dome with crystal panels. The entire solar system
    is visible — planets in their orbits, like a living mobile. Zibbie points: the Big Dipper, Orion, Cassiopeia. The constellations
    glow on the crystal as Zibbie names them. {child_name} spins slowly, taking it all in.'
- id: page_21
  moment: 'EMOTION: touching friendship. Zibbie gives {child_name} a gift: a star map — a small, round disc that glows with
    tiny lights marking every planet they visited. Zibbie''s antennae sparkle. {child_name} and Zibbie float side by side,
    looking at the stars. {child_pronoun_subject} hugs Zibbie goodbye — Zibbie''s body is warm and hums gently.'
- id: page_22
  moment: 'EMOTION: profound wonder — CLIMAX. Zibbie points to a distant spiral galaxy — the Andromeda Galaxy — a pinwheel
    of light. ''Someday,'' Zibbie''s beeps seem to say, ''you will go there too.'' {child_name} understands: this is not the
    end. The journey of discovery NEVER ends. {child_name} looks back at Earth — a tiny blue dot in the distance — and feels
    infinite possibility. The star map glows in {child_possessive_det} palm.'
- id: page_23
  moment: 'EMOTION: warm return. The journey home. Each planet bids farewell as they pass — Mars winks its red eye, Jupiter''s
    spot seems to wave, Saturn tilts its rings. The cardboard spaceship hums contentedly. The blue-green marble of Earth grows
    larger. {child_name} holds the star map tight. Home is calling.'
- id: page_24
  moment: 'EMOTION: proof of magic — resolution. The cardboard spaceship sits in the backyard under the beech tree. Evening.
    {child_name} holds the star map — it GLOWS faintly in the twilight. The real stars blink overhead. Pepin stands guard
    — lamp-head still lit. {child_name} looks from the star map to the sky, then back. The adventure was real. The adventure
    is just beginning.'
- id: page_25
  moment: 'EMOTION: proud sharing. The next morning, {child_name} brings the star map to school. During show-and-tell, {child_pronoun_subject}
    holds it up — the class gasps. ''Did you really visit all these planets?'' asks Madame Laurent, smiling. {child_name}
    nods. ''Mercury, Venus — '' {child_pronoun_subject} touches each point — ''Jupiter, Saturn, and the Atomium Station.'''
- id: page_26
  moment: 'EMOTION: spreading wonder. At recess, {child_name} and friends build a cardboard rocket in the schoolyard. {child_pronoun_subject}
    directs the construction: ''The colander goes here — that''s the control panel!'' ''The lampshade is the dome!'' The other
    children cheer when it''s finished. Pepin stands beside it — second-in-command.'
- id: page_27
  moment: 'EMOTION: shared stargazing. That evening, {child_name} and Papa sit in the backyard under the beech tree. Papa
    points out the Big Dipper — the Great Bear. Then Orion — the Hunter. {child_name} shows Papa the star map — it glows softly,
    pointing out each constellation. Papa''s face is lit from below by the map''s gentle light. ''Show me Saturn,'' he says.'
- id: page_28
  moment: 'EMOTION: infinite possibility — final. {child_name} in bed, the star map glowing softly on the nightstand. The
    cardboard spaceship stands in the backyard under the real stars — a silhouette against the Milky Way. Pepin the lamp-robot
    stands guard by the bedroom window, lamp dim but still on. {child_name} closes {child_possessive_det} eyes, a smile on
    {child_possessive_det} face. The last image: the star map, then a fade to space — infinite, beautiful, waiting.'
age: 4-8
