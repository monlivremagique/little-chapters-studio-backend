slug: anniversaire
title: Joyeux Anniversaire, {child_name}
theme:
- birthday
- celebration
- party
story_subject: On {child_name}'s birthday, every corner of their Belgian home holds a surprise — from the single red balloon
  floating at dawn to the custom-built swing waiting in the garden. With Maman, Papa, best friend Lucas, and neighbour Madame
  Dubois, {child_name} experiences a day of laughter, games, a gâteau with speculoos crumble, and a climactic surprise that
  makes the whole family tear up. This isn't just a party — it's a celebration of who {child_name} is and the joy they bring
  to everyone who loves them.
main_emotion: heartfelt joy
learning_message: 'Birthdays are beautiful not for the presents or the cake — they celebrate YOU: the wonderful person you
  are and the joy you bring to everyone around you. The best gift is the love of family and friends, wrapped in laughter and
  shared moments.'
languages:
- fr
- en
- nl
visual_style: Aquarelle belge premium — ligne claire inspirée Hergé/Tintin, aquarelle chaude façon Marcel Marlier/Martine,
  couleurs profondes et lumineuses, texture de papier aquarelle, personnages expressifs, arrière-plans détaillés type Forêt
  de Soignes ou rue bruxelloise
story_page_count: 24
constraints:
- Every page should feel celebratory and bright
- Show a mix of family and friends
- The surprise at the end must feel earned and emotional
- Balloons, streamers, confetti — the full party treatment
- Belgian birthday traditions included
- No generic descriptions. Every visual detail must be specific — textures, colours, lighting, camera angle.
- Each scene's emotion must be clearly stated in a short phrase (e.g., 'wonderment', 'determination', 'joy').
- The hero's appearance must remain consistent across all pages — same hair colour, eye colour, clothing style.
- Avoid ambiguous phrasing that could lead to inconsistent image generation.
- 'The story arc must be unbroken: setup → rising action → climax → resolution with clear emotional progression.'
- Every page must feel celebratory, bright, and warm.
- '{child_name} wears a red birthday crown throughout — visual anchor across all scenes.'
- 'The colour palette shifts: morning soft blues → afternoon bright yellows → evening warm golds.'
- 'Belgian birthday traditions must be visually clear: gaufres, speculoos, stoemp, Lang zal hij/zij leven.'
- The climax (new swing) must feel like a gasp-worthy, heart-melting surprise.
arc_type: ordinary-to-extraordinary
climax_page: page_18
setting: A festive Belgian home — decorated living room, garden with party tent, kitchen with birthday cake
cultural_context: 'The birthday includes Belgian traditions: a gâteau with speculoos crumble, balloons in Belgian flag colours,
  frites at the party, a traditional stoemp lunch, and ''Lang zal hij/zij leven'' sung by guests. Presents are wrapped in
  festive paper from a local boutique.

  '
parent_emotion_goal: Tears of gratitude — the parent relives each birthday milestone and feels overwhelming love for their
  child. The swing scene is designed to make parents emotional as they remember the joy of surprising their own child. The
  final snuggle scene captures the quiet miracle of watching a child grow.
secondary_characters:
- Maman — Mother, organises the party
- Papa — Father, brings the surprise
- Lucas — Best friend
- Madame Dubois — Neighbour who bakes the cake
scenes:
- id: page_1
  moment: 'EMOTION: excited anticipation. {child_name} stirs awake in their cosy bedroom. Morning sunlight streams through
    lace curtains, casting dancing patterns on the wall. A single red balloon with a silver star floats by the door, tied
    to the bedpost with a ribbon. A ''JOYEUX ANNIVERSAIRE'' banner in hand-painted letters hangs over the window. {child_name}
    sits up, eyes sparkling — the day has begun.'
- id: page_2
  moment: 'EMOTION: delighted surprise. {child_name} runs downstairs and stops at the living room doorway, mouth open. The
    room is transformed: colourful streamers cascade from the ceiling, balloons cluster in every corner — red, yellow, and
    blue like the Belgian flag. A banner spells ''{child_name}'' in bright, bouncy letters. Maman and Papa wait with huge
    smiles, arms open.'
- id: page_3
  moment: 'EMOTION: pure love. Maman hugs {child_name} tight, then places a golden birthday crown with a ruby-red jewel on
    their head. Papa puts a party blower to his lips and BLOWS — the sound makes {child_name} burst into laughter. The family
    dog, wearing a tiny party hat, barks and spins in circles. {child_name} touches the crown, already feeling like royalty.'
- id: page_4
  moment: 'EMOTION: sweet tradition. Special birthday breakfast: gaufres de Bruxelles — light, golden, dusted with powdered
    sugar — topped with whipped cream and fresh strawberries. A single candle flickers in the top gaufre. Maman and Papa sing
    ''Lang zal hij/zij leven'' softly. {child_name} leans in, closes {child_possessive_det} eyes, and blows. The candle smoke
    curls upward like a wish.'
- id: page_5
  moment: 'EMOTION: joyful anticipation. Papa brings out the first gift — a rectangular box wrapped in paper with tiny stars.
    {child_name} tears the paper carefully at first, then eagerly. Inside: a set of coloured pencils (every colour of the
    rainbow) and a thick sketchbook with a blank cover. {child_name} hugs Papa so tight his glasses go crooked.'
- id: page_6
  moment: 'EMOTION: friendship joy. DING-DONG! The doorbell. Lucas bursts in holding a wrapped present and a silver balloon
    that says ''Joyeux Anniversaire!'' The two friends hug like they haven''t seen each other in years. Lucas presents the
    gift: a book about space with a shiny rocket on the cover.'
- id: page_7
  moment: 'EMOTION: bubbling fun. The door keeps ringing. More friends arrive, each carrying a gift. The living room fills
    with children, laughter, and bouncing balloons. Some kids dive into the streamers. Maman claps her hands — ''OK, tout
    le monde — musical chairs!'' The dog runs in wild circles under everyone''s feet.'
- id: page_8
  moment: 'EMOTION: playful competition. Chairs in a row. Papa plays the accordion — a cheerful Belgian polka. Children march
    around the chairs. The music stops! Chaos. {child_name} and Lucas both dive for the same chair and land on it together,
    laughing so hard they can barely breathe. Everyone else is on the floor giggling.'
- id: page_9
  moment: 'EMOTION: suspense + triumph. In the garden, a star-shaped piñata hangs from the beech tree — yellow with red trim.
    Papa spins {child_name} gently, then hands them the stick. WHACK! The piñata splits. Candy, speculoos, and small toys
    rain down like treasure. Children scramble on the grass, cheering.'
- id: page_10
  moment: 'EMOTION: generous happiness. Children gather candy from the grass. {child_name} picks up a handful of speculoos
    and shares the best pieces with Lucas. The sun shines bright over the white party tent. A jug of water with lemon slices
    and mint sits on a table. The garden is alive with colour.'
- id: page_11
  moment: 'EMOTION: warm community. Lunchtime! The garden table is set with a festive cloth — red and white checked. Steaming
    bowls of stoemp (mashed potatoes with carrots, leeks, and a hint of nutmeg) are served. It''s a Belgian classic. The children
    eat hungrily. Maman pours lemon water. Papa tells a joke. Everyone laughs.'
- id: page_12
  moment: 'EMOTION: awe. Madame Dubois arrives from next door carrying THE CAKE on a silver tray. It''s a three-tier masterpiece:
    speculoos crumble between layers, fresh strawberries peeking out, white chocolate drip over the edges. On top, in perfect
    icing: ''{child_name}''. The children gasp. Even the dog''s ears perk up.'
- id: page_13
  moment: 'EMOTION: magical anticipation. Seven candles (or {child_name}''s age) stand in the cake, flames flickering. Maman
    lights the last one with a match. Everyone gathers in a circle. ''JOYEUX ANNIVERSAIRE!'' they sing — in French, then Dutch,
    then English. {child_name}''s face glows golden in the candlelight. Eyes wide. Heart full.'
- id: page_14
  moment: 'EMOTION: triumphant joy. {child_name} takes a deep breath and BLOWS. All candles go out in one go! Everyone cheers
    and claps. Streamers fly through the air. Papa snaps a photo — capturing {child_name}''s beaming face mid-laugh. Maman
    wipes a tear from the corner of her eye. The dog barks joyfully.'
- id: page_15
  moment: 'EMOTION: sweet contentment. Cake is served. {child_name} gets the first slice — the one with the most strawberries
    and the thickest layer of speculoos crumble. Madame Dubois winks. Lucas has a crumb on his nose. {child_name} points and
    giggles. Lucas wipes it, then grins — now {child_name} has frosting on their cheek.'
- id: page_16
  moment: 'EMOTION: delighted gratitude. Present time! {child_name} opens each gift with ceremony: a puzzle with 100 pieces
    from Lucas (a map of Belgium), a Tintin comic (''Le Trésor de Rackham le Rouge'') from Mamie Claire, wooden building blocks
    from Grand-père. Each gift gets an enthusiastic ''MERCI!'' and a hug.'
- id: page_17
  moment: 'EMOTION: speechless wonder. The last present is a big, flat box from Maman and Papa. {child_name} unwraps slowly,
    savouring the mystery. Inside: a framed poster of the solar system — but personalized. It reads ''{child_name}''s Universe''
    in elegant script, with each planet labelled. {child_name} is completely speechless. {child_pronoun_subject} hugs the
    frame to {child_possessive_det} chest.'
- id: page_18
  moment: 'EMOTION: overwhelming love and surprise — CLIMAX. Maman takes {child_name}''s hand. ''There''s one more surprise.''
    She leads everyone to the garden. Tied to the beech tree by a sturdy rope — a brand-new wooden swing, handcrafted, with
    ''{child_name}'' painted in rainbow letters on the seat. Papa installed it while everyone was eating cake. {child_name}''s
    jaw drops. Tears well in Maman''s eyes. {child_name} runs to the swing, touches the painted name, then turns to hug both
    parents at once. Lucas cheers. Madame Dubois clutches her heart. This is the moment the day becomes unforgettable.'
- id: page_19
  moment: 'EMOTION: golden contentment. {child_name} sits on the new swing. Lucas pushes gently. The other children line up
    for their turn. The late afternoon sun casts a golden glow over the garden — everything is warm and soft. Maman and Papa
    watch from the porch, arms around each other, faces soft with love.'
- id: page_20
  moment: 'EMOTION: peaceful reflection. Evening. The party is over. The living room is quiet, scattered with confetti and
    ribbons like snow. {child_name} sits on the sofa in pyjamas, the space poster propped beside them, a photo of the swing
    in their hands. Maman and Papa sit on either side, exhausted and happy. The single candle from breakfast flickers on the
    coffee table.'
- id: page_21
  moment: 'EMOTION: warm togetherness. {child_name} sits on Maman''s lap, scrolling through Papa''s photos on the camera.
    ''Look, the cake!'' ''Oh, Lucas with frosting on his nose!'' ''The swing!'' Each photo brings a fresh giggle. Maman''s
    arms wrap around {child_name}. Papa leans in from behind.'
- id: page_22
  moment: 'EMOTION: gentle community. Madame Dubois drops by with leftover speculoos wrapped in a checkered napkin. {child_name}
    thanks her with a warm hug, then offers her the slice of gâteau saved just for her. She pats {child_name}''s head proudly.
    ''You grow so fast,'' she says, eyes glistening.'
- id: page_23
  moment: 'EMOTION: soothing comfort. Bath time. Warm water, mountains of bubbles. The birthday crown floats among the bubbles.
    {child_name} hums ''Lang zal hij/zij leven'' softly. The day''s excitement melts away in the warmth. Maman and Papa watch
    from the doorway, silhouetted against the hall light, tired and full of love.'
- id: page_24
  moment: 'EMOTION: complete love — resolution. {child_name} in pyjamas, nestled between Maman and Papa on the sofa. The space
    poster leans against the coffee table. The swing photo is in {child_name}''s hands. The single breakfast candle — now
    just a stub — flickers. {child_name} whispers, ''This was the best birthday ever.'' Maman kisses {child_possessive_det}
    forehead. Papa squeezes {child_possessive_det} hand. {child_name} snuggles deeper, wrapped in love from both sides. The
    candle flickers one last time and goes out — the day is complete.'
age: 2-7
