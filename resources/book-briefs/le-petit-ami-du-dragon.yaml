slug: le-petit-ami-du-dragon
title: Le petit ami du dragon
theme:
  - courage
  - friendship
  - wonder
  - adventure
age: 4-7
story_subject: Un enfant entend un bruit étrange venant de la forêt interdite. Tout le monde dit qu'un dragon vit là-haut. Mais quand l'enfant ose s'approcher, il découvre que le dragon n'est pas méchant — il est seul, triste, et a juste besoin d'un ami.
main_emotion: courage tendre, émerveillement et amitié qui surmonte la peur
learning_message: Les choses les plus effrayantes deviennent moins grandes quand on ose les regarder avec un cœur ouvert.
languages:
  - fr
  - en
  - nl
visual_style: premium watercolor and gouache storybook, soft magical forest atmosphere, warm golden-hour light filtering through ancient trees, misty mountains in the distance, rich emerald and amber palette, gentle dragon design with iridescent scales
story_page_count: 6
constraints:
  - bedtime safe for 4-7
  - dragon design must be warm and friendly, never scary
  - coherent hero design across all pages
  - coherent dragon design across all pages — same color, shape, size
  - no text inside generated images
  - no visible letters, signs, logos or readable labels in images
  - no fire, destruction, or violence
  - poetic but clear language, age-appropriate for 4-7
  - strong visual variety between pages
  - every page must contain a clear action and visible emotion
  - warm, safe, cozy atmosphere throughout — even in the "scary" forest
  - dragon must look huggable, not threatening — large gentle eyes, soft scales
arc_type: comfort-to-courage
climax_page: page_5
setting: un petit village belge au pied des Ardennes, une forêt ancienne avec des arbres centenaires, une clairière secrète, une grotte douce tapissée de mousse et de pierres lumineuses, un sommet de colline avec vue sur les vallées ardennaises
cultural_context: Belgique premium — forêts des Ardennes, légendes de dragons wallons, chaleur du foyer villageois, pâté gaumais et tarte au riz, héritage celtique belge, contes de fées transmis par les grands-parents
parent_emotion_goal: Le parent veut que l'enfant apprenne que le courage n'est pas l'absence de peur, mais la décision d'aller voir au-delà de ses peurs avec un cœur tendre.
secondary_characters:
  - une vieille dame du village (Mamie Elara) qui connaît la légende du dragon et encourage l'enfant
  - un petit écureuil curieux qui guide l'enfant vers la forêt
  - le dragon — grand mais doux, yeux dorés immenses, écailles bleu-vert irisé, ailes douces comme du velours
scenes:
  - id: page_1
    moment: >-
      Au pied des collines ardennaises, l'enfant joue près du potager de Mamie Elara.
      Soudain, un grondement sourd résonne depuis la forêt. Les oiseaux se taisent.
      Mamie Elara dit doucement: "C'est le vieux dragon, {child_name}. Personne
      n'ose lui parler depuis bien longtemps." L'enfant regarde la forêt, partagé
      entre curiosité et petite frayeur.
  - id: page_2
    moment: >-
      Poussé par la curiosité, l'enfant s'avance entre les grands arbres. La lumière
      filtre à travers les feuilles en taches dorées. Un petit écureuil roux bondit
      de branche en branche, comme s'il montrait le chemin. Des fleurs lumineuses
      bordent le sentier. Le cœur de l'enfant bat fort, mais les pas continuent.
  - id: page_3
    moment: >-
      Dans une clairière baignée de lumière dorée, l'enfant aperçoit le dragon pour
      la première fois. Il est immense, couché en rond comme un chat, le museau
      posé sur ses pattes. Ses écailles scintillent de bleu et de vert. Quand il
      ouvre ses grands yeux dorés, l'enfant voit qu'il n'a pas peur de lui.
      Le dragon pleure — des larmes de crystal tombent sur la mousse.
  - id: page_4
    moment: >-
      L'enfant s'approche doucement et s'assoit près du dragon. Il ne sait pas quoi
      dire, alors il cueille une fleur lumineuse et la pose devant le grand museau.
      Le dragon renifle, puis un souffle chaud et parfumé caresse les cheveux de
      l'enfant. "Pourquoi pleures-tu?" murmure l'enfant. Le dragon montre l'horizon
      — il est le dernier de son espèce, et il se sent si seul.
  - id: page_5
    moment: >-
      L'enfant a une idée. Il prend la main du dragon et le guide hors de la
      clairière, vers le village. Les ailes du dragon se déploient comme des voiles
      de velours bleu-vert. Ensemble, ils marchent à travers la forêt — un tout petit
      et un très grand — et le dragon ne pleure plus. Les arbres s'écartent, le
      soleil les accueille. C'est le grand moment lumineux du récit.
  - id: page_6
    moment: >-
      Au village, les habitants sortent de leurs maisons, d'abord effrayés, puis
      émerveillés. Le dragon incline doucement la tête. Mamie Elara s'avance et
      pose sa main ridée sur son museau. "Bienvenue, mon grand", dit-elle. Ce soir-là,
      une fête improvisée a lieu sur la place. L'enfant et le dragon regardent les
      étoiles ensemble. Le dragon n'est plus seul.
